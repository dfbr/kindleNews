name: Daily Feed Cache

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    - cron: "0 2 * * 0,2-6"
  workflow_dispatch:

jobs:
  collect-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Collect daily feed cache
        run: python -m kindle_news --mode ingest --no-email

      - name: Upload cache artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: daily-feed-cache-artifacts
          path: |
            output/cache/**
            output/artifacts/**
          if-no-files-found: warn

      - name: Commit daily cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/cache/*.json output/artifacts/*.json || true
          if ! git diff --cached --quiet; then
            git commit -m "Update daily feed cache"
            git push
          fi